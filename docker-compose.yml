version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: buddy-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-buddy_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: buddy-redis
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: buddy-server
    environment:
      - NODE_ENV=production
      - PORT=9000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=buddy_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLIENT_URL=http://localhost:3000
    env_file:
      - ./server/.env
    ports:
      - "9000:9000"
    depends_on:
      - db
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: buddy-client
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:9000/api/v1
    env_file:
      - ./client/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
